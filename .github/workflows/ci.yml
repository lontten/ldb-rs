name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y libmysqlclient-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Coverage
        run: |
          cargo llvm-cov --workspace \
            --lcov --output-path lcov.info \
            --ignore-filename-regex='ldb-core/src/(connect|engine|exec)\.rs'
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex='ldb-core/src/(connect|engine|exec)\.rs'
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  integration:
    name: integration
    runs-on: ubuntu-latest
    env:
      LDB_MYSQL_URL: mysql://root:test@127.0.0.1:3306/ldb_test
      LDB_PG_URL: postgres://postgres:test@127.0.0.1:5432/ldb_test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: ldb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ldb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ldb_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test --package ldb-core --features integration -- --test-threads=1 --include-ignored

  benchmark:
    name: benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: true
    env:
      LDB_MYSQL_URL: mysql://root:test@127.0.0.1:3306/ldb_test
      LDB_PG_URL: postgres://postgres:test@127.0.0.1:5432/ldb_test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: ldb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ldb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ldb_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-diesel
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y libmysqlclient-dev
      - name: Setup tables
        run: |
          cargo test --package ldb-core --features integration -- --test-threads=1 --include-ignored mysql_crud_smoke pg_crud_smoke
      - run: cargo bench --package ldb-bench --bench scenario_compare --features diesel
      - name: Prepare Criterion Pages
        run: |
          test -f target/criterion/report/index.html
          python3 ldb-bench/scripts/gen_overview.py target/criterion
          test -f target/criterion/index.html
          touch target/criterion/.nojekyll
      - uses: actions/upload-artifact@v6
        with:
          name: criterion-report
          path: target/criterion
          if-no-files-found: ignore
      - uses: actions/configure-pages@v5
        if: github.ref == 'refs/heads/main'
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: target/criterion

  deploy-pages:
    name: deploy-pages
    needs: benchmark
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
